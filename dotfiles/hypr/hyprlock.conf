# Hyprlock screen locker config
# Minimal — matches the no-gaps, no-animations aesthetic

background {
    monitor =
    path = /home/gc/Pictures/rheinfall.jpg
    blur_size = 4
    blur_passes = 2
    noise = 0.01
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(200, 200, 200, 1)
    fade_on_empty = false
    placeholder_text = <i>password...</i>
    hide_input = false
    rounding = -1
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 64
    font_family = Google Sans
    position = 0, -100
    halign = center
    valign = center
}
