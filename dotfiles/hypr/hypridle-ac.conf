general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before hibernate/suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

# On AC power: no idle-triggered actions (no dim, no lock, no DPMS off, no suspend).
# Hibernate/suspend (manual or lid-close) still locks normally.
