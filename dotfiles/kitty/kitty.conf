# ── Font ──────────────────────────────────────────────────────────────────
font_family      monospace
font_size        12.0

# ── Colors ────────────────────────────────────────────────────────────────
background       #000000
background_opacity 0.67

# ── Cursor ────────────────────────────────────────────────────────────────
cursor_shape     underline
cursor_blink_interval 0.5

# ── Scrolling ─────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Bell ──────────────────────────────────────────────────────────────────
enable_audio_bell no

# ── Performance ───────────────────────────────────────────────────────────
repaint_delay    6

# ── Window ────────────────────────────────────────────────────────────────
confirm_os_window_close 0
