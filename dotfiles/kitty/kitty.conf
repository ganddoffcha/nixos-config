# ── Font ──────────────────────────────────────────────────────────────────
font_family      monospace
font_size        12.0

# ── Colors: Everforest ────────────────────────────────────────────────────
foreground       #d3c6aa
background       #2d353b
background_opacity 0.67
selection_foreground #2d353b
selection_background #e6e2cc

# black
color0 #475258
color8 #859289
# red
color1 #e67e80
color9 #e67e80
# green
color2 #a7c080
color10 #a7c080
# yellow
color3 #dbbc7f
color11 #dbbc7f
# blue
color4 #7fbbb3
color12 #7fbbb3
# magenta
color5 #d699b6
color13 #d699b6
# cyan
color6 #83c092
color14 #83c092
# white
color7 #d3c6aa
color15 #e6e2cc

# ── Cursor ────────────────────────────────────────────────────────────────
cursor_shape     underline
cursor_blink_interval 0.5
cursor            #d3c6aa

# ── Scrolling ─────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Bell ──────────────────────────────────────────────────────────────────
enable_audio_bell no

# ── Performance ───────────────────────────────────────────────────────────
repaint_delay    6

# ── Window ────────────────────────────────────────────────────────────────
confirm_os_window_close 0
