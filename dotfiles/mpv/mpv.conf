# ── Video Output ──────────────────────────────────────────────────────────
vo=gpu-next
gpu-api=vulkan
hwdec=vaapi

# ── Scaling ──────────────────────────────────────────────────────────────
profile=gpu-hq
scale=ewa_lanczossharp
cscale=ewa_lanczossharp

# ── Audio ─────────────────────────────────────────────────────────────────
audio-channels=stereo
volume-max=150
volume=100

# ── Subtitles ────────────────────────────────────────────────────────────
sub-auto=fuzzy
sub-font-size=42
sub-color="#ffffff"
sub-border-size=2

# ── OSD ───────────────────────────────────────────────────────────────────
osd-font-size=28
osd-bar-h=3
osd-border-size=1

# ── Behavior ──────────────────────────────────────────────────────────────
keep-open=yes
save-position-on-quit=yes
ytdl-format=bv[height<=1080]+ba/b[height<=1080] / wv+ba/w

# ── Screenshots ──────────────────────────────────────────────────────────
screenshot-format=png
screenshot-directory=~/Pictures/screenshots
