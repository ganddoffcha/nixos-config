# Stylix dynamic — placeholders replaced by home.nix
[flavor]
dark  = "{{base00}}"
light = "{{base07}}"

[status]
separator_open  = "{{base03}}"
separator_close = "{{base03}}"

[manager]
cwd = { fg = "{{base0D}}" }

[filetype]
rules = [
	{ mime = "image/*", fg = "{{base0C}}" },
	{ mime = "video/*", fg = "{{base09}}" },
	{ mime = "audio/*", fg = "{{base0E}}" },
	{ mime = "application/zip", fg = "{{base0A}}" },
	{ mime = "application/gzip", fg = "{{base0A}}" },
	{ mime = "application/x-tar", fg = "{{base0A}}" },
	{ name = "*.md", fg = "{{base0D}}" },
	{ name = "*.nix", fg = "{{base0D}}" },
	{ name = "*.lua", fg = "{{base0D}}" },
	{ name = "*.py", fg = "{{base0D}}" },
]

[syntect_theme]
bg          = "{{base00}}"
fg          = "{{base05}}"
comment     = "{{base03}}"
string      = "{{base0B}}"
constant    = "{{base09}}"
function    = "{{base0D}}"
keyword     = "{{base0E}}"
operator    = "{{base0C}}"
identifier  = "{{base0D}}"
number      = "{{base09}}"
selection_bg = "{{base02}}"
line_number = "{{base03}}"
line_number_active = "{{base04}}"
